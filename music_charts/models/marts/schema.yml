version: 2

models:
  - name: dim_artist
    description: "One row per unique artist, enriched with MusicBrainz metadata"
    columns:
      - name: artist_key
        description: "Surrogate key (md5 hash of artist_name + artist_mbid)"
        data_tests:
          - unique
          - not_null

  - name: dim_track
    description: "One row per unique track"
    columns:
      - name: track_key
        description: "Surrogate key (md5 hash of track_name + artist_name)"
        data_tests:
          - unique
          - not_null

  - name: fact_chart_entry
    description: "One row per track, per chart, per day"
    columns:
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: country_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_country')
              field: country_key
      - name: artist_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_artist')
              field: artist_key
      - name: track_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_track')
              field: track_key
      - name: genre_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_genre')
              field: genre_key
